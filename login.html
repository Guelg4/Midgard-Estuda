<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login — Midgard</title>
  <link rel="stylesheet" href="login.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="login-card">
    <div class="login-logo">M</div>
    <h1 class="login-title">MIDGARD</h1>
    <p class="login-sub">Ordem da Fênix · Portal de Estudos</p>

    <form>
      <label>Email</label>
      <input type="email" id="email" oninput="onChangeEmail()" placeholder="seuemail@gmail.com">
      <div class="error" id="email-required-error">Email é obrigatório</div>
      <div class="error" id="email-invalid-error">Email inválido</div>

      <label>Senha</label>
      <input type="password" id="password" oninput="onChangePassword()" placeholder="••••••••">
      <div class="error" id="password-required-error">Senha é obrigatória</div>

      <button type="button" class="btn-solid" id="login-button" disabled>Entrar</button>
      <button type="button" class="btn-outline" id="register-button">Criar conta</button>
      <button type="button" class="btn-clear" id="recovery-password-button" disabled>Esqueci minha senha</button>
    </form>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
